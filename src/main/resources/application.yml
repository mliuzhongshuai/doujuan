spring:
  application:
    name: doujuan
---
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/doujuan
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
---
sa-token:
  token-name: Authentication
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: true